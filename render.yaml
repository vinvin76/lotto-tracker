services:
  - type: web
    name: lotto-tracker
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.18.0
      - key: APP_BASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: EMAIL_VERIFICATION_HOURS
        value: 24
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_YEARLY
        sync: false
      - key: STRIPE_CUSTOMER_PORTAL_RETURN_URL
        sync: false
      - key: STRIPE_CHECKOUT_SUCCESS_URL
        sync: false
      - key: STRIPE_CHECKOUT_CANCEL_URL
        sync: false
